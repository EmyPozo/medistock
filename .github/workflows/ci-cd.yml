# ============================================================
# CI/CD — MediStock
# CI: valida e imagen Docker de cada componente en cada push/PR
# CD: en main, publica imágenes a GHCR y despliega las Lambdas
# ============================================================
name: CI-CD MediStock

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        servicio: [gateway, catalogo-service, pedidos-service, notificaciones-lambda]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: ${{ matrix.servicio }}
        run: npm install

      - name: Validar sintaxis de JS
        working-directory: ${{ matrix.servicio }}
        run: |
          for f in *.js; do node --check "$f"; done

      - name: Construir imagen Docker
        run: docker build -t medistock-${{ matrix.servicio }}:${{ github.sha }} ./${{ matrix.servicio }}

  cd-imagenes:
    name: Publicar imágenes (GHCR)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        servicio: [gateway, catalogo-service, pedidos-service, notificaciones-lambda]
    steps:
      - uses: actions/checkout@v4

      # GHCR exige nombres en minúsculas; convertimos el owner (EmyPozo -> emypozo)
      - name: Owner en minúsculas
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.servicio }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/medistock-${{ matrix.servicio }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/medistock-${{ matrix.servicio }}:${{ github.sha }}

  cd-lambdas:
    name: Desplegar Lambdas (Serverless)
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: notificaciones-lambda
        run: npm install

      # Requiere configurar los secrets AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY
      # en Settings > Secrets del repositorio. Si no existen, el job se omite.
      - name: Deploy a AWS
        if: ${{ vars.DEPLOY_AWS == 'true' }}
        working-directory: notificaciones-lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: npx serverless deploy --stage prod
